<div class="container">
    <div class="card">
        <div class="card w-full max-w-md bg-white shadow-lg rounded-xl ">
            <div class="card-body p-5">

                <h2 class="text-2xl font-bold mb-4">
                    Información del Usuario
                </h2>

                <ul class="user-list">

                    <li>
                        <span class="font-semibold">Usuario:</span>
                        {{ cliente.username }}
                    </li>

                    <li>
                        <span class="font-semibold">Nombre:</span>
                        {{ cliente.firstName }}
                    </li>

                    <li>
                        <span class="font-semibold">Apellido:</span>
                        {{ cliente.lastName }}
                    </li>

                    <li>
                        <span class="font-semibold">Correo:</span>
                        {{ cliente.email }}
                    </li>

                    <li>
                        <span class="font-semibold">Teléfono:</span>
                        {{ cliente.phone }}
                    </li>

                    <li>
                        <span class="font-semibold">Estado:</span>

                        <span class="badge" [class.badge-success]="cliente.userStatus === 1"
                            [class.badge-error]="cliente.userStatus !== 1">
                            {{ cliente.userStatus }}
                        </span>
                    </li>

                </ul>


            </div>
        </div>
    </div>
</div>
